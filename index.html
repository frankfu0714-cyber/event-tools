<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Event Toolkit</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%9A%AB%3C/text%3E%3C/svg%3E" />
<style>
  :root {
    --bg: #fafaf9;
    --surface: #ffffff;
    --text: #111111;
    --muted: #6b7280;
    --border: #e5e7eb;
    --border-strong: #111111;
    --accent: #111111;
    --accent-soft: #f3f4f6;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Roboto, Helvetica, Arial, sans-serif;
    color: var(--text);
    background: var(--bg);
    min-height: 100dvh;
    -webkit-font-smoothing: antialiased;
  }
  .container {
    max-width: 640px;
    margin: 0 auto;
    padding: 56px 24px 80px;
  }
  .topbar {
    display: flex;
    justify-content: flex-end;
    margin-bottom: 32px;
  }
  .lang-switch {
    display: inline-flex;
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 3px;
    background: var(--surface);
  }
  .lang-btn {
    appearance: none;
    border: 0;
    background: transparent;
    color: var(--muted);
    font-size: 13px;
    font-weight: 500;
    padding: 6px 14px;
    border-radius: 999px;
    cursor: pointer;
    transition: all 0.15s ease;
    font-family: inherit;
  }
  .lang-btn.active {
    background: var(--accent);
    color: #ffffff;
  }
  header.hero { margin-bottom: 48px; }
  header.hero h1 {
    margin: 0 0 6px;
    font-size: 28px;
    font-weight: 600;
    letter-spacing: -0.02em;
  }
  header.hero p {
    margin: 0;
    color: var(--muted);
    font-size: 14px;
    line-height: 1.5;
  }
  .section { margin-bottom: 48px; }
  .section-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 16px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }
  .section-head h2 {
    margin: 0;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.02em;
    text-transform: uppercase;
  }
  .section-head .sub {
    margin: 0;
    color: var(--muted);
    font-size: 12px;
  }
  .row { display: flex; gap: 10px; flex-wrap: wrap; }
  .row > * { flex: 1; min-width: 120px; }
  label {
    display: block;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 6px;
    font-weight: 500;
  }
  input[type="text"], input[type="number"], input[type="datetime-local"], select {
    width: 100%;
    padding: 10px 12px;
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
    outline: none;
    font-family: inherit;
    transition: border-color 0.15s;
  }
  input:focus, select:focus { border-color: var(--border-strong); }
  .btn {
    appearance: none;
    padding: 10px 16px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s ease;
    border: 1px solid transparent;
  }
  .btn-primary {
    background: var(--accent);
    color: #ffffff;
    border-color: var(--accent);
  }
  .btn-primary:hover { opacity: 0.85; }
  .btn-ghost {
    background: var(--surface);
    color: var(--text);
    border-color: var(--border);
  }
  .btn-ghost:hover { border-color: var(--border-strong); }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .actions {
    display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap;
  }

  /* Picker */
  .picker-result {
    margin-top: 24px;
    text-align: center;
    padding: 40px 16px;
    border: 1px solid var(--border);
    border-radius: 12px;
    background: var(--surface);
    position: relative;
    overflow: hidden;
  }
  .picker-num {
    font-size: clamp(72px, 18vw, 120px);
    font-weight: 700;
    letter-spacing: -0.05em;
    line-height: 1;
    font-variant-numeric: tabular-nums;
    display: inline-block;
    transform-origin: center;
  }
  .picker-num.rolling {
    animation: pick-pop 0.55s cubic-bezier(.2,.9,.2,1.2);
  }
  @keyframes pick-pop {
    0%   { transform: scale(0.4) rotate(-8deg); opacity: 0.1; filter: blur(4px); }
    40%  { transform: scale(1.22) rotate(3deg); opacity: 1; filter: blur(0); }
    70%  { transform: scale(0.95) rotate(-1deg); }
    100% { transform: scale(1) rotate(0deg); }
  }
  .picker-result.flash::before {
    content: "";
    position: absolute; inset: 0;
    background: var(--accent-soft);
    animation: flash 0.55s ease;
    pointer-events: none;
  }
  @keyframes flash {
    0%   { opacity: 0.8; }
    100% { opacity: 0; }
  }

  /* Picked-list */
  .picked-block {
    margin-top: 24px;
    padding: 16px 18px;
    border: 1px solid var(--border);
    border-radius: 12px;
    background: var(--surface);
  }
  .picked-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 10px;
  }
  .picked-head h3 {
    margin: 0;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .picked-count {
    font-size: 12px;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
  }
  .picked-list {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .picked-empty {
    color: var(--muted);
    font-size: 13px;
  }
  .pick-chip {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 36px;
    padding: 6px 10px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    font-size: 14px;
    font-weight: 500;
    font-variant-numeric: tabular-nums;
    color: var(--text);
  }
  .pick-chip.latest {
    background: var(--accent);
    color: #ffffff;
    border-color: var(--accent);
  }

  /* Countdown */
  .countdown-display {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
    margin-top: 24px;
    max-width: 320px;
    margin-left: auto;
    margin-right: auto;
  }
  .cd-cell {
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 22px 8px;
    text-align: center;
    background: var(--surface);
  }
  .cd-num {
    font-size: clamp(40px, 9vw, 64px);
    font-weight: 700;
    letter-spacing: -0.03em;
    line-height: 1;
    font-variant-numeric: tabular-nums;
  }
  .cd-label {
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-top: 8px;
  }
  .event-title {
    text-align: center;
    margin-top: 16px;
    color: var(--muted);
    font-size: 13px;
  }
  .event-title strong { color: var(--text); font-weight: 500; }
  .cd-status {
    margin-top: 12px;
    text-align: center;
    font-size: 13px;
    min-height: 18px;
  }
  .cd-status.done { color: var(--text); font-weight: 600; }
  .cd-num.warning { color: #dc2626; }

  .hidden { display: none !important; }

  footer {
    margin-top: 32px;
    text-align: center;
    color: var(--muted);
    font-size: 11px;
  }

  @media (max-width: 480px) {
    .container { padding: 32px 18px 48px; }
    .cd-cell { padding: 18px 6px; }
  }
</style>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <div class="lang-switch" role="tablist" aria-label="Language">
        <button class="lang-btn active" data-lang="en">EN</button>
        <button class="lang-btn" data-lang="zh">中</button>
      </div>
    </div>

    <header class="hero">
      <h1 data-i18n="title">Event Toolkit</h1>
      <p data-i18n="tagline">A minimal number picker and countdown timer.</p>
    </header>

    <!-- NUMBER PICKER (top) -->
    <section class="section" id="section-picker">
      <div class="section-head">
        <h2 data-i18n="picker_heading">Number Picker</h2>
        <p class="sub" data-i18n="picker_sub">Random pick in a range.</p>
      </div>

      <div class="row">
        <div>
          <label for="pk-min" data-i18n="min">Minimum</label>
          <input id="pk-min" type="number" value="1" />
        </div>
        <div>
          <label for="pk-max" data-i18n="max">Maximum</label>
          <input id="pk-max" type="number" value="100" />
        </div>
        <div>
          <label for="pk-unique" data-i18n="unique_label">Repeats</label>
          <select id="pk-unique">
            <option value="no" data-i18n="allow_repeats">Allow repeats</option>
            <option value="yes" data-i18n="no_repeats">No repeats</option>
          </select>
        </div>
      </div>

      <div class="actions">
        <button class="btn btn-primary" id="pk-pick" data-i18n="pick_btn">Pick a number</button>
        <button class="btn btn-ghost" id="pk-undo" data-i18n="undo_btn" disabled>Undo</button>
        <button class="btn btn-ghost" id="pk-clear" data-i18n="clear_btn">Clear all</button>
      </div>

      <div class="picker-result" id="pk-result">
        <div class="picker-num" id="pk-num">&mdash;</div>
      </div>

      <div class="picked-block">
        <div class="picked-head">
          <h3 data-i18n="picked_heading">Picked so far</h3>
          <span class="picked-count" id="pk-count">0</span>
        </div>
        <div class="picked-list" id="pk-list">
          <span class="picked-empty" data-i18n="no_picks">No picks yet.</span>
        </div>
      </div>
    </section>

    <!-- COUNTDOWN (below) -->
    <section class="section" id="section-countdown">
      <div class="section-head">
        <h2 data-i18n="cd_heading">Countdown</h2>
        <p class="sub" data-i18n="cd_sub">Short activity timer.</p>
      </div>

      <div class="row">
        <div style="flex: 2">
          <label for="cd-title" data-i18n="event_title_label">Activity name</label>
          <input id="cd-title" type="text" data-i18n-placeholder="event_title_ph" placeholder="e.g. Icebreaker round" />
        </div>
        <div>
          <label for="cd-mins-in" data-i18n="mins_label">Minutes</label>
          <input id="cd-mins-in" type="number" min="0" max="59" value="5" />
        </div>
        <div>
          <label for="cd-secs-in" data-i18n="secs_label">Seconds</label>
          <input id="cd-secs-in" type="number" min="0" max="59" value="0" />
        </div>
      </div>

      <div class="actions">
        <button class="btn btn-primary" id="cd-start" data-i18n="start_btn">Start</button>
        <button class="btn btn-ghost" id="cd-pause" data-i18n="pause_btn" disabled>Pause</button>
        <button class="btn btn-ghost" id="cd-reset" data-i18n="reset_btn">Reset</button>
      </div>

      <div id="cd-output" class="hidden">
        <div class="countdown-display">
          <div class="cd-cell"><div class="cd-num" id="cd-mins">05</div><div class="cd-label" data-i18n="minutes">Minutes</div></div>
          <div class="cd-cell"><div class="cd-num" id="cd-secs">00</div><div class="cd-label" data-i18n="seconds">Seconds</div></div>
        </div>
        <div class="event-title"><span data-i18n="counting_to">Running:</span> <strong id="cd-show-title" data-i18n="default_event">your activity</strong></div>
        <div class="cd-status" id="cd-status"></div>
      </div>
    </section>

    <footer>
      <span data-i18n="footer">No tracking, no ads, works offline.</span>
    </footer>
  </div>

<script>
(function () {
  "use strict";

  // ---------- i18n ----------
  const I18N = {
    en: {
      title: "Event Toolkit",
      tagline: "A minimal number picker and countdown timer.",
      picker_heading: "Number Picker",
      picker_sub: "Random pick in a range.",
      min: "Minimum",
      max: "Maximum",
      unique_label: "Repeats",
      allow_repeats: "Allow repeats",
      no_repeats: "No repeats",
      pick_btn: "Pick a number",
      undo_btn: "Undo",
      clear_btn: "Clear all",
      picked_heading: "Picked so far",
      no_picks: "No picks yet.",
      all_picked: "All {n} numbers have been picked.",
      clear_to_restart: "Clear to start over.",
      invalid_numbers: "Please enter valid numbers.",
      cd_heading: "Countdown",
      cd_sub: "Short activity timer.",
      event_title_label: "Activity name",
      event_title_ph: "e.g. Icebreaker round",
      mins_label: "Minutes",
      secs_label: "Seconds",
      start_btn: "Start",
      pause_btn: "Pause",
      resume_btn: "Resume",
      reset_btn: "Reset",
      minutes: "Minutes",
      seconds: "Seconds",
      counting_to: "Running:",
      default_event: "your activity",
      pick_time: "Please enter a time greater than zero.",
      its_time: "Time's up!",
      footer: "No tracking, no ads, works offline.",
    },
    zh: {
      title: "活動工具",
      tagline: "簡約的隨機抽號與倒數計時工具。",
      picker_heading: "隨機抽號",
      picker_sub: "在指定範圍內隨機抽取。",
      min: "最小值",
      max: "最大值",
      unique_label: "重複",
      allow_repeats: "允許重複",
      no_repeats: "不重複",
      pick_btn: "抽一個號碼",
      undo_btn: "復原",
      clear_btn: "全部清除",
      picked_heading: "已抽出號碼",
      no_picks: "尚無紀錄。",
      all_picked: "全部 {n} 個號碼都已抽完。",
      clear_to_restart: "清除以重新開始。",
      invalid_numbers: "請輸入有效的數字。",
      cd_heading: "倒數計時",
      cd_sub: "短時活動計時器。",
      event_title_label: "活動名稱",
      event_title_ph: "例如：破冰環節",
      mins_label: "分",
      secs_label: "秒",
      start_btn: "開始",
      pause_btn: "暫停",
      resume_btn: "繼續",
      reset_btn: "重設",
      minutes: "分",
      seconds: "秒",
      counting_to: "進行中：",
      default_event: "您的活動",
      pick_time: "請輸入大於零的時間。",
      its_time: "時間到！",
      footer: "無追蹤、無廣告、可離線使用。",
    }
  };

  let currentLang = "en";

  function t(key, vars) {
    let s = (I18N[currentLang] && I18N[currentLang][key]) || I18N.en[key] || key;
    if (vars) Object.keys(vars).forEach(k => { s = s.replace("{" + k + "}", vars[k]); });
    return s;
  }

  function applyLanguage(lang) {
    currentLang = lang;
    document.documentElement.lang = lang === "zh" ? "zh-Hant" : "en";
    document.title = t("title");

    document.querySelectorAll("[data-i18n]").forEach(el => {
      const key = el.getAttribute("data-i18n");
      el.textContent = t(key);
    });
    document.querySelectorAll("[data-i18n-placeholder]").forEach(el => {
      const key = el.getAttribute("data-i18n-placeholder");
      el.setAttribute("placeholder", t(key));
    });

    document.querySelectorAll(".lang-btn").forEach(b => {
      b.classList.toggle("active", b.dataset.lang === lang);
    });

    // Re-render dynamic bits
    renderPicked();
    // Pause button may show Resume
    if (cdPaused && cdTimer === null && cdRemaining > 0 && cdStarted) {
      cdPause.textContent = t("resume_btn");
    } else {
      cdPause.textContent = t("pause_btn");
    }
    // Update event title text
    if (cdStarted) {
      cdShowTitle.textContent = cdTitle.value.trim() || t("default_event");
      if (cdStatus.classList.contains("done")) cdStatus.textContent = t("its_time");
    }
  }

  document.querySelectorAll(".lang-btn").forEach(btn => {
    btn.addEventListener("click", () => applyLanguage(btn.dataset.lang));
  });

  // ---------- Picker ----------
  const pkMin = document.getElementById("pk-min");
  const pkMax = document.getElementById("pk-max");
  const pkUnique = document.getElementById("pk-unique");
  const pkPick = document.getElementById("pk-pick");
  const pkUndo = document.getElementById("pk-undo");
  const pkClear = document.getElementById("pk-clear");
  const pkNum = document.getElementById("pk-num");
  const pkResult = document.getElementById("pk-result");
  const pkList = document.getElementById("pk-list");
  const pkCount = document.getElementById("pk-count");

  const history = [];

  function renderPicked() {
    pkCount.textContent = String(history.length);
    if (history.length === 0) {
      pkList.innerHTML = `<span class="picked-empty">${t("no_picks")}</span>`;
      pkUndo.disabled = true;
      return;
    }
    pkUndo.disabled = false;
    const lastIdx = history.length - 1;
    pkList.innerHTML = history
      .map((n, i) => `<span class="pick-chip${i === lastIdx ? ' latest' : ''}">${n}</span>`)
      .join("");
  }

  function triggerPickAnim() {
    pkNum.classList.remove("rolling");
    pkResult.classList.remove("flash");
    void pkNum.offsetWidth;
    pkNum.classList.add("rolling");
    pkResult.classList.add("flash");
  }

  pkPick.addEventListener("click", () => {
    const min = parseInt(pkMin.value, 10);
    const max = parseInt(pkMax.value, 10);
    if (!Number.isFinite(min) || !Number.isFinite(max)) {
      pkNum.textContent = "?";
      return;
    }
    const lo = Math.min(min, max);
    const hi = Math.max(min, max);
    const range = hi - lo + 1;

    let pick;
    if (pkUnique.value === "yes") {
      const used = new Set(history);
      if (used.size >= range) {
        pkNum.textContent = "✓";
        return;
      }
      do {
        pick = Math.floor(Math.random() * range) + lo;
      } while (used.has(pick));
    } else {
      pick = Math.floor(Math.random() * range) + lo;
    }

    pkNum.textContent = String(pick);
    triggerPickAnim();

    history.push(pick);
    renderPicked();
  });

  pkUndo.addEventListener("click", () => {
    if (history.length === 0) return;
    history.pop();
    if (history.length === 0) {
      pkNum.textContent = "—";
    } else {
      pkNum.textContent = String(history[history.length - 1]);
      triggerPickAnim();
    }
    renderPicked();
  });

  pkClear.addEventListener("click", () => {
    history.length = 0;
    pkNum.textContent = "—";
    renderPicked();
  });

  // ---------- Countdown ----------
  const cdTitle = document.getElementById("cd-title");
  const cdMinsIn = document.getElementById("cd-mins-in");
  const cdSecsIn = document.getElementById("cd-secs-in");
  const cdStart = document.getElementById("cd-start");
  const cdPause = document.getElementById("cd-pause");
  const cdReset = document.getElementById("cd-reset");
  const cdOutput = document.getElementById("cd-output");
  const cdShowTitle = document.getElementById("cd-show-title");
  const cdStatus = document.getElementById("cd-status");
  const cdMinsEl = document.getElementById("cd-mins");
  const cdSecsEl = document.getElementById("cd-secs");

  function pad2(n) { return String(n).padStart(2, "0"); }

  let cdTimer = null;
  let cdRemaining = 0;   // milliseconds
  let cdEndAt = 0;
  let cdStarted = false;
  let cdPaused = false;

  function renderRemaining(ms) {
    const totalSec = Math.max(0, Math.ceil(ms / 1000));
    const m = Math.floor(totalSec / 60);
    const s = totalSec % 60;
    cdMinsEl.textContent = pad2(m);
    cdSecsEl.textContent = pad2(s);
    // Warning color under 10 seconds total
    const lowTime = totalSec <= 10 && totalSec > 0;
    cdMinsEl.classList.toggle("warning", lowTime);
    cdSecsEl.classList.toggle("warning", lowTime);
  }

  function tickCountdown() {
    const now = Date.now();
    const diff = cdEndAt - now;
    if (diff <= 0) {
      renderRemaining(0);
      cdStatus.textContent = t("its_time");
      cdStatus.classList.add("done");
      clearInterval(cdTimer);
      cdTimer = null;
      cdPause.disabled = true;
      cdRemaining = 0;
      return;
    }
    renderRemaining(diff);
  }

  cdStart.addEventListener("click", () => {
    const mins = parseInt(cdMinsIn.value, 10) || 0;
    const secs = parseInt(cdSecsIn.value, 10) || 0;
    const totalMs = (mins * 60 + secs) * 1000;
    if (totalMs <= 0) {
      cdOutput.classList.remove("hidden");
      cdStatus.classList.remove("done");
      cdStatus.textContent = t("pick_time");
      return;
    }
    cdRemaining = totalMs;
    cdEndAt = Date.now() + totalMs;
    cdStarted = true;
    cdPaused = false;
    cdShowTitle.textContent = cdTitle.value.trim() || t("default_event");
    cdStatus.classList.remove("done");
    cdStatus.textContent = "";
    cdOutput.classList.remove("hidden");
    renderRemaining(totalMs);
    if (cdTimer) clearInterval(cdTimer);
    cdTimer = setInterval(tickCountdown, 250);
    cdPause.disabled = false;
    cdPause.textContent = t("pause_btn");
  });

  cdPause.addEventListener("click", () => {
    if (!cdStarted) return;
    if (cdTimer) {
      // Currently running → pause
      clearInterval(cdTimer);
      cdTimer = null;
      cdRemaining = Math.max(0, cdEndAt - Date.now());
      cdPaused = true;
      cdPause.textContent = t("resume_btn");
    } else if (cdRemaining > 0) {
      // Paused → resume
      cdEndAt = Date.now() + cdRemaining;
      cdTimer = setInterval(tickCountdown, 250);
      cdPaused = false;
      cdPause.textContent = t("pause_btn");
    }
  });

  cdReset.addEventListener("click", () => {
    if (cdTimer) { clearInterval(cdTimer); cdTimer = null; }
    cdStarted = false;
    cdPaused = false;
    cdRemaining = 0;
    cdEndAt = 0;
    cdOutput.classList.add("hidden");
    cdStatus.classList.remove("done");
    cdStatus.textContent = "";
    cdMinsEl.classList.remove("warning");
    cdSecsEl.classList.remove("warning");
    cdPause.disabled = true;
    cdPause.textContent = t("pause_btn");
  });

  // Detect default language from browser
  try {
    const nav = (navigator.language || "en").toLowerCase();
    if (nav.startsWith("zh")) applyLanguage("zh");
    else applyLanguage("en");
  } catch (e) { applyLanguage("en"); }
})();
</script>
</body>
</html>
