<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Event Toolkit</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%9A%AB%3C/text%3E%3C/svg%3E" />
<style>
  :root {
    --bg: #fafaf9;
    --surface: #ffffff;
    --text: #111111;
    --muted: #6b7280;
    --border: #e5e7eb;
    --border-strong: #111111;
    --accent: #111111;
    --accent-soft: #f3f4f6;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Roboto, Helvetica, Arial, sans-serif;
    color: var(--text);
    background: var(--bg);
    min-height: 100dvh;
    -webkit-font-smoothing: antialiased;
  }
  .container {
    max-width: 640px;
    margin: 0 auto;
    padding: 56px 24px 80px;
  }
  .topbar {
    display: flex;
    justify-content: flex-end;
    margin-bottom: 32px;
  }
  .lang-switch {
    display: inline-flex;
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 3px;
    background: var(--surface);
  }
  .lang-btn {
    appearance: none;
    border: 0;
    background: transparent;
    color: var(--muted);
    font-size: 13px;
    font-weight: 500;
    padding: 6px 14px;
    border-radius: 999px;
    cursor: pointer;
    transition: all 0.15s ease;
    font-family: inherit;
  }
  .lang-btn.active {
    background: var(--accent);
    color: #ffffff;
  }
  header.hero {
    margin-bottom: 48px;
  }
  header.hero h1 {
    margin: 0 0 6px;
    font-size: 28px;
    font-weight: 600;
    letter-spacing: -0.02em;
  }
  header.hero p {
    margin: 0;
    color: var(--muted);
    font-size: 14px;
    line-height: 1.5;
  }
  .section {
    margin-bottom: 48px;
  }
  .section-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 16px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }
  .section-head h2 {
    margin: 0;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.02em;
    text-transform: uppercase;
  }
  .section-head .sub {
    margin: 0;
    color: var(--muted);
    font-size: 12px;
  }
  .row { display: flex; gap: 10px; flex-wrap: wrap; }
  .row > * { flex: 1; min-width: 120px; }
  label {
    display: block;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 6px;
    font-weight: 500;
  }
  input[type="text"], input[type="number"], input[type="datetime-local"], select {
    width: 100%;
    padding: 10px 12px;
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
    outline: none;
    font-family: inherit;
    transition: border-color 0.15s;
  }
  input:focus, select:focus {
    border-color: var(--border-strong);
  }
  .btn {
    appearance: none;
    padding: 10px 16px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s ease;
    border: 1px solid transparent;
  }
  .btn-primary {
    background: var(--accent);
    color: #ffffff;
    border-color: var(--accent);
  }
  .btn-primary:hover { opacity: 0.85; }
  .btn-ghost {
    background: var(--surface);
    color: var(--text);
    border-color: var(--border);
  }
  .btn-ghost:hover { border-color: var(--border-strong); }
  .actions {
    display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap;
  }

  /* Picker */
  .picker-result {
    margin-top: 24px;
    text-align: center;
    padding: 32px 16px;
    border: 1px solid var(--border);
    border-radius: 12px;
    background: var(--surface);
  }
  .picker-num {
    font-size: clamp(56px, 14vw, 88px);
    font-weight: 600;
    letter-spacing: -0.04em;
    line-height: 1;
    font-variant-numeric: tabular-nums;
    transition: transform 0.2s;
  }
  .picker-num.rolling { animation: pulse 0.3s ease; }
  @keyframes pulse { 0% { transform: scale(0.94); } 100% { transform: scale(1); } }
  .history {
    margin-top: 14px;
    color: var(--muted);
    font-size: 12px;
    text-align: center;
    min-height: 18px;
    word-break: break-word;
  }
  .history span {
    color: var(--text);
    margin: 0 3px;
    font-variant-numeric: tabular-nums;
  }

  /* Countdown */
  .countdown-display {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-top: 24px;
  }
  .cd-cell {
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 8px;
    text-align: center;
    background: var(--surface);
  }
  .cd-num {
    font-size: clamp(24px, 5vw, 36px);
    font-weight: 600;
    letter-spacing: -0.02em;
    font-variant-numeric: tabular-nums;
  }
  .cd-label {
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-top: 4px;
  }
  .event-title {
    text-align: center;
    margin-top: 16px;
    color: var(--muted);
    font-size: 13px;
  }
  .event-title strong { color: var(--text); font-weight: 500; }
  .cd-status {
    margin-top: 12px;
    text-align: center;
    font-size: 13px;
    min-height: 18px;
  }
  .cd-status.done { color: var(--text); font-weight: 500; }

  .hidden { display: none !important; }

  footer {
    margin-top: 32px;
    text-align: center;
    color: var(--muted);
    font-size: 11px;
  }

  @media (max-width: 480px) {
    .container { padding: 32px 18px 48px; }
    .cd-cell { padding: 14px 6px; }
  }
</style>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <div class="lang-switch" role="tablist" aria-label="Language">
        <button class="lang-btn active" data-lang="en">EN</button>
        <button class="lang-btn" data-lang="zh">中</button>
      </div>
    </div>

    <header class="hero">
      <h1 data-i18n="title">Event Toolkit</h1>
      <p data-i18n="tagline">A minimal number picker and countdown timer.</p>
    </header>

    <!-- NUMBER PICKER SECTION (on top) -->
    <section class="section" id="section-picker">
      <div class="section-head">
        <h2 data-i18n="picker_heading">Number Picker</h2>
        <p class="sub" data-i18n="picker_sub">Random pick in a range.</p>
      </div>

      <div class="row">
        <div>
          <label for="pk-min" data-i18n="min">Minimum</label>
          <input id="pk-min" type="number" value="1" />
        </div>
        <div>
          <label for="pk-max" data-i18n="max">Maximum</label>
          <input id="pk-max" type="number" value="100" />
        </div>
        <div>
          <label for="pk-unique" data-i18n="unique_label">Repeats</label>
          <select id="pk-unique">
            <option value="no" data-i18n="allow_repeats">Allow repeats</option>
            <option value="yes" data-i18n="no_repeats">No repeats</option>
          </select>
        </div>
      </div>

      <div class="actions">
        <button class="btn btn-primary" id="pk-pick" data-i18n="pick_btn">Pick a number</button>
        <button class="btn btn-ghost" id="pk-clear" data-i18n="clear_btn">Clear history</button>
      </div>

      <div class="picker-result">
        <div class="picker-num" id="pk-num">&mdash;</div>
        <div class="history" id="pk-history" data-i18n="no_picks">No picks yet.</div>
      </div>
    </section>

    <!-- COUNTDOWN SECTION (below) -->
    <section class="section" id="section-countdown">
      <div class="section-head">
        <h2 data-i18n="cd_heading">Countdown</h2>
        <p class="sub" data-i18n="cd_sub">Live timer to your event.</p>
      </div>

      <div class="row">
        <div style="flex: 2">
          <label for="cd-title" data-i18n="event_title_label">Event title</label>
          <input id="cd-title" type="text" data-i18n-placeholder="event_title_ph" placeholder="e.g. New Year's Eve" />
        </div>
        <div style="flex: 2">
          <label for="cd-date" data-i18n="target_label">Target date &amp; time</label>
          <input id="cd-date" type="datetime-local" />
        </div>
      </div>

      <div class="actions">
        <button class="btn btn-primary" id="cd-start" data-i18n="start_btn">Start countdown</button>
        <button class="btn btn-ghost" id="cd-reset" data-i18n="reset_btn">Reset</button>
      </div>

      <div id="cd-output" class="hidden">
        <div class="countdown-display">
          <div class="cd-cell"><div class="cd-num" id="cd-days">0</div><div class="cd-label" data-i18n="days">Days</div></div>
          <div class="cd-cell"><div class="cd-num" id="cd-hours">0</div><div class="cd-label" data-i18n="hours">Hours</div></div>
          <div class="cd-cell"><div class="cd-num" id="cd-mins">0</div><div class="cd-label" data-i18n="minutes">Minutes</div></div>
          <div class="cd-cell"><div class="cd-num" id="cd-secs">0</div><div class="cd-label" data-i18n="seconds">Seconds</div></div>
        </div>
        <div class="event-title"><span data-i18n="counting_to">Counting down to</span> <strong id="cd-show-title" data-i18n="default_event">your event</strong></div>
        <div class="cd-status" id="cd-status"></div>
      </div>
    </section>

    <footer>
      <span data-i18n="footer">No tracking, no ads, works offline.</span>
    </footer>
  </div>

<script>
(function () {
  "use strict";

  // ---------- i18n ----------
  const I18N = {
    en: {
      title: "Event Toolkit",
      tagline: "A minimal number picker and countdown timer.",
      picker_heading: "Number Picker",
      picker_sub: "Random pick in a range.",
      min: "Minimum",
      max: "Maximum",
      unique_label: "Repeats",
      allow_repeats: "Allow repeats",
      no_repeats: "No repeats",
      pick_btn: "Pick a number",
      clear_btn: "Clear history",
      no_picks: "No picks yet.",
      recent: "Recent:",
      all_picked: "All {n} numbers have been picked.",
      clear_to_restart: "Clear history to start over.",
      invalid_numbers: "Please enter valid numbers.",
      cd_heading: "Countdown",
      cd_sub: "Live timer to your event.",
      event_title_label: "Event title",
      event_title_ph: "e.g. New Year's Eve",
      target_label: "Target date & time",
      start_btn: "Start countdown",
      reset_btn: "Reset",
      days: "Days",
      hours: "Hours",
      minutes: "Minutes",
      seconds: "Seconds",
      counting_to: "Counting down to",
      default_event: "your event",
      pick_date: "Please pick a target date & time.",
      invalid_date: "That date doesn't look valid.",
      its_time: "It's time.",
      footer: "No tracking, no ads, works offline.",
    },
    zh: {
      title: "活動工具",
      tagline: "簡約的隨機抽號與倒數計時工具。",
      picker_heading: "隨機抽號",
      picker_sub: "在指定範圍內隨機抽取。",
      min: "最小值",
      max: "最大值",
      unique_label: "重複",
      allow_repeats: "允許重複",
      no_repeats: "不重複",
      pick_btn: "抽一個號碼",
      clear_btn: "清除紀錄",
      no_picks: "尚無紀錄。",
      recent: "最近：",
      all_picked: "全部 {n} 個號碼都已抽完。",
      clear_to_restart: "清除紀錄以重新開始。",
      invalid_numbers: "請輸入有效的數字。",
      cd_heading: "倒數計時",
      cd_sub: "即時倒數至指定時刻。",
      event_title_label: "活動名稱",
      event_title_ph: "例如：跨年夜",
      target_label: "目標日期與時間",
      start_btn: "開始倒數",
      reset_btn: "重設",
      days: "天",
      hours: "時",
      minutes: "分",
      seconds: "秒",
      counting_to: "倒數至",
      default_event: "您的活動",
      pick_date: "請選擇目標日期與時間。",
      invalid_date: "日期格式無效。",
      its_time: "時間到！",
      footer: "無追蹤、無廣告、可離線使用。",
    }
  };

  let currentLang = "en";

  function t(key, vars) {
    let s = (I18N[currentLang] && I18N[currentLang][key]) || I18N.en[key] || key;
    if (vars) {
      Object.keys(vars).forEach(k => { s = s.replace("{" + k + "}", vars[k]); });
    }
    return s;
  }

  function applyLanguage(lang) {
    currentLang = lang;
    document.documentElement.lang = lang === "zh" ? "zh-Hant" : "en";
    document.title = t("title");

    document.querySelectorAll("[data-i18n]").forEach(el => {
      const key = el.getAttribute("data-i18n");
      el.textContent = t(key);
    });
    document.querySelectorAll("[data-i18n-placeholder]").forEach(el => {
      const key = el.getAttribute("data-i18n-placeholder");
      el.setAttribute("placeholder", t(key));
    });

    // Update button states
    document.querySelectorAll(".lang-btn").forEach(b => {
      b.classList.toggle("active", b.dataset.lang === lang);
    });

    // Re-render dynamic bits
    renderHistory();
    if (cdTarget) {
      // If countdown running, refresh labels + title
      const titleVal = cdTitle.value.trim() || t("default_event");
      cdShowTitle.textContent = titleVal;
      if (cdStatus.classList.contains("done")) {
        cdStatus.textContent = t("its_time");
      }
    }
  }

  document.querySelectorAll(".lang-btn").forEach(btn => {
    btn.addEventListener("click", () => applyLanguage(btn.dataset.lang));
  });

  // ---------- Countdown ----------
  const cdTitle = document.getElementById("cd-title");
  const cdDate = document.getElementById("cd-date");
  const cdStart = document.getElementById("cd-start");
  const cdReset = document.getElementById("cd-reset");
  const cdOutput = document.getElementById("cd-output");
  const cdShowTitle = document.getElementById("cd-show-title");
  const cdStatus = document.getElementById("cd-status");
  const cdDays = document.getElementById("cd-days");
  const cdHours = document.getElementById("cd-hours");
  const cdMins = document.getElementById("cd-mins");
  const cdSecs = document.getElementById("cd-secs");

  // Default target = 1 week from now at noon
  (function setDefaultDate() {
    const d = new Date();
    d.setDate(d.getDate() + 7);
    d.setHours(12, 0, 0, 0);
    const pad = n => String(n).padStart(2, "0");
    cdDate.value = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
  })();

  let cdTimer = null;
  let cdTarget = null;

  function pad2(n) { return String(n).padStart(2, "0"); }

  function tickCountdown() {
    if (!cdTarget) return;
    const now = new Date();
    let diff = cdTarget.getTime() - now.getTime();
    if (diff <= 0) {
      cdDays.textContent = "0";
      cdHours.textContent = "00";
      cdMins.textContent = "00";
      cdSecs.textContent = "00";
      cdStatus.textContent = t("its_time");
      cdStatus.classList.add("done");
      clearInterval(cdTimer);
      cdTimer = null;
      return;
    }
    const days = Math.floor(diff / 86400000);
    diff -= days * 86400000;
    const hours = Math.floor(diff / 3600000);
    diff -= hours * 3600000;
    const mins = Math.floor(diff / 60000);
    diff -= mins * 60000;
    const secs = Math.floor(diff / 1000);

    cdDays.textContent = String(days);
    cdHours.textContent = pad2(hours);
    cdMins.textContent = pad2(mins);
    cdSecs.textContent = pad2(secs);
  }

  cdStart.addEventListener("click", () => {
    if (!cdDate.value) {
      cdStatus.classList.remove("done");
      cdStatus.textContent = t("pick_date");
      cdOutput.classList.remove("hidden");
      return;
    }
    cdTarget = new Date(cdDate.value);
    if (isNaN(cdTarget.getTime())) {
      cdStatus.textContent = t("invalid_date");
      return;
    }
    const title = cdTitle.value.trim() || t("default_event");
    cdShowTitle.textContent = title;
    cdStatus.classList.remove("done");
    cdStatus.textContent = "";
    cdOutput.classList.remove("hidden");
    tickCountdown();
    if (cdTimer) clearInterval(cdTimer);
    cdTimer = setInterval(tickCountdown, 1000);
  });

  cdReset.addEventListener("click", () => {
    if (cdTimer) { clearInterval(cdTimer); cdTimer = null; }
    cdTarget = null;
    cdOutput.classList.add("hidden");
    cdStatus.classList.remove("done");
    cdStatus.textContent = "";
  });

  // ---------- Picker ----------
  const pkMin = document.getElementById("pk-min");
  const pkMax = document.getElementById("pk-max");
  const pkUnique = document.getElementById("pk-unique");
  const pkPick = document.getElementById("pk-pick");
  const pkClear = document.getElementById("pk-clear");
  const pkNum = document.getElementById("pk-num");
  const pkHistory = document.getElementById("pk-history");

  const history = [];

  function renderHistory() {
    if (history.length === 0) {
      pkHistory.textContent = t("no_picks");
      return;
    }
    pkHistory.innerHTML = t("recent") + " " + history.slice(-12).map(n => `<span>${n}</span>`).join("");
  }

  pkPick.addEventListener("click", () => {
    const min = parseInt(pkMin.value, 10);
    const max = parseInt(pkMax.value, 10);
    if (!Number.isFinite(min) || !Number.isFinite(max)) {
      pkNum.textContent = "?";
      pkHistory.textContent = t("invalid_numbers");
      return;
    }
    const lo = Math.min(min, max);
    const hi = Math.max(min, max);
    const range = hi - lo + 1;

    let pick;
    if (pkUnique.value === "yes") {
      const used = new Set(history);
      if (used.size >= range) {
        pkNum.textContent = "✓";
        pkHistory.innerHTML = t("all_picked", { n: range }) + ' <span>' + t("clear_to_restart") + '</span>';
        return;
      }
      do {
        pick = Math.floor(Math.random() * range) + lo;
      } while (used.has(pick));
    } else {
      pick = Math.floor(Math.random() * range) + lo;
    }

    pkNum.textContent = String(pick);
    pkNum.classList.remove("rolling");
    void pkNum.offsetWidth;
    pkNum.classList.add("rolling");

    history.push(pick);
    renderHistory();
  });

  pkClear.addEventListener("click", () => {
    history.length = 0;
    pkNum.textContent = "—";
    renderHistory();
  });

  // Detect default language from browser (fallback to en)
  try {
    const nav = (navigator.language || "en").toLowerCase();
    if (nav.startsWith("zh")) applyLanguage("zh");
    else applyLanguage("en");
  } catch (e) { applyLanguage("en"); }
})();
</script>
</body>
</html>
